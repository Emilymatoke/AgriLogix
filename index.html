<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AgriLogix</title>
                <link rel="stylesheet" href="style.css">

    </head>
    <body>
        <div class="container">
            <h1>AgriLogix</h1>
            <p class="tagline">Know Your Farm. Grow Your Profit.</p>

        <div class="card">
            <h3>Total Income</h3>
            <p id="income">KES 0</p>
        </div>

        <div class="card">
            <h3>Total Expenses</h3>
            <p id="expenses">KES 0</p>

        </div>

        <div class="card">
            <h3>Profit</h3>
            <p id="profit">KES 0</p>

        </div>

        <button id="addBtn">+ Add Record</button>

        <div id="form" class="hidden">
            <input type="number" id="amount" placeholder="Enter Amount">
            <select id="type">
               <option value="income">Income</option>
                <option value="expenses">Expenses</option>
            </select>
             <input type="text" id="desc" placeholder="Description (e.g., Chicken Feed)">
            <button onclick="saveRecord()">Save Record</button>
        </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
